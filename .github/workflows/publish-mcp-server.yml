name: Publish MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/mcp-server/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          LOCAL=$(node -p "require('./packages/mcp-server/package.json').version")
          REMOTE=$(npm view @kitnai/mcp-server version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$REMOTE"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-bump package.json
        if: steps.version.outputs.bumped == 'true'
        run: |
          cd packages/mcp-server
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build MCP server
        run: bun run --cwd packages/mcp-server build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        working-directory: packages/mcp-server

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mcp-server/package.json
          git commit -m "chore: bump @kitnai/mcp-server to v${{ steps.version.outputs.version }}"
          git push
